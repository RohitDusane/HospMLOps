apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-readmission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-readmission
  template:
    metadata:
      labels:
        app: hospital-readmission
    spec:
      containers:
      - name: hospital-readmission
        image: us-central1-docker.pkg.dev/hospital-readmission-ml/hospital-readmission-repo/hospital-readmission:prod
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20
