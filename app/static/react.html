<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Readmission Prediction</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-shadow {
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration - Match your FastAPI server
        const API_BASE_URL = 'http://127.0.0.1:8000';

        // Main App Component
        function App() {
            const [activeTab, setActiveTab] = useState('predict');
            const [apiStatus, setApiStatus] = useState(null);
            const [models, setModels] = useState([]);
            const [features, setFeatures] = useState([]);
            const [error, setError] = useState(null);

            useEffect(() => {
                checkApiHealth();
                loadModels();
                loadFeatures();
            }, []);

            const checkApiHealth = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/health`);
                    if (!response.ok) throw new Error('API not responding');
                    const data = await response.json();
                    setApiStatus(data);
                    setError(null);
                } catch (error) {
                    setApiStatus({ status: 'offline', error: error.message });
                    setError('⚠️ Cannot connect to API. Make sure FastAPI is running on port 8000');
                }
            };

            const loadModels = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/models`);
                    if (!response.ok) throw new Error('Failed to load models');
                    const data = await response.json();
                    // Filter only real_to_real models
                    const realToRealModels = data.filter(model => model.startsWith('real_to_real'));
                    setModels(realToRealModels);
                } catch (error) {
                    console.error('Failed to load models:', error);
                }
            };

            const loadFeatures = async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/features`);
                    if (!response.ok) throw new Error('Failed to load features');
                    const data = await response.json();
                    setFeatures(data);
                } catch (error) {
                    console.error('Failed to load features:', error);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Header */}
                    <header className="gradient-bg text-white py-6 shadow-lg">
                        <div className="container mx-auto px-4">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold">Hospital Readmission Predictor</h1>
                                    <p className="text-gray-200 mt-1">ML-Powered 30-Day Readmission Risk Assessment</p>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="text-right">
                                        <div className="text-sm text-gray-200">API Status</div>
                                        <div className="flex items-center gap-2 mt-1">
                                            <div className={`w-3 h-3 rounded-full ${apiStatus?.status === 'healthy' ? 'bg-green-400' : 'bg-red-400'}`}></div>
                                            <span className="font-semibold">{apiStatus?.status || 'Checking...'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Error Banner */}
                    {error && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4">
                            <div className="container mx-auto px-4">
                                <div className="flex items-center">
                                    <div className="flex-shrink-0">
                                        <svg className="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clipRule="evenodd" />
                                        </svg>
                                    </div>
                                    <div className="ml-3">
                                        <p className="text-sm text-red-700">{error}</p>
                                        <p className="text-xs text-red-600 mt-1">Run: <code className="bg-red-100 px-2 py-1 rounded">uvicorn app.main:app --reload</code></p>
                                    </div>
                                    <button onClick={checkApiHealth} className="ml-auto bg-red-100 text-red-700 px-3 py-1 rounded text-sm hover:bg-red-200">
                                        Retry
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation Tabs */}
                    <div className="bg-white border-b">
                        <div className="container mx-auto px-4">
                            <div className="flex gap-1">
                                <TabButton active={activeTab === 'predict'} onClick={() => setActiveTab('predict')}>
                                    Single Prediction
                                </TabButton>
                                <TabButton active={activeTab === 'upload'} onClick={() => setActiveTab('upload')}>
                                    CSV Upload
                                </TabButton>
                                <TabButton active={activeTab === 'models'} onClick={() => setActiveTab('models')}>
                                    Models & Info
                                </TabButton>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="container mx-auto px-4 py-8">
                        {activeTab === 'predict' && <SinglePrediction models={models} apiStatus={apiStatus} />}
                        {activeTab === 'upload' && <CSVUpload models={models} apiStatus={apiStatus} />}
                        {activeTab === 'models' && <ModelsInfo models={models} apiStatus={apiStatus} features={features} />}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t mt-12 py-6">
                        <div className="container mx-auto px-4 text-center text-gray-600">
                            <p>Hospital Readmission Prediction System v1.0</p>
                            <p className="text-sm mt-1">Powered by FastAPI + React + Machine Learning</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Tab Button Component
        function TabButton({ active, onClick, children }) {
            return (
                <button
                    onClick={onClick}
                    className={`px-6 py-3 font-medium transition-colors ${
                        active
                            ? 'text-purple-600 border-b-2 border-purple-600'
                            : 'text-gray-600 hover:text-gray-800'
                    }`}
                >
                    {children}
                </button>
            );
        }

        // Single Prediction Component
        function SinglePrediction({ models, apiStatus }) {
            const [formData, setFormData] = useState({
                race: 'Caucasian',
                gender: 'Female',
                age: '[50-60)',
                admission_type_id: 1,
                discharge_disposition_id: 1,
                admission_source_id: 7,
                time_in_hospital: 3,
                num_lab_procedures: 44,
                num_procedures: 1,
                num_medications: 14,
                number_outpatient: 0,
                number_emergency: 0,
                number_inpatient: 0,
                number_diagnoses: 8,
                A1Cresult: 'Not Available',
                insulin: 'Steady',
                change: 'Ch',
                diabetesMed: 'Yes'
            });
            const [selectedModel, setSelectedModel] = useState('real_to_real_random_forest');
            const [prediction, setPrediction] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                
                try {
                    const response = await fetch(`${API_BASE_URL}/predict?model_key=${selectedModel}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'Prediction failed');
                    }
                    
                    const data = await response.json();
                    setPrediction(data);
                } catch (error) {
                    console.error('Prediction error:', error);
                    setError(error.message);
                } finally {
                    setLoading(false);
                }
            };

            const isDisabled = !apiStatus || apiStatus.status !== 'healthy' || models.length === 0;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    {/* Form */}
                    <div className="card-shadow bg-white rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800">Patient Information</h2>
                        
                        {error && (
                            <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                                <strong>Error:</strong> {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {/* Demographics */}
                            <div className="grid grid-cols-2 gap-4">
                                <FormField label="Race">
                                    <select value={formData.race} onChange={e => setFormData({...formData, race: e.target.value})} className="w-full p-2 border rounded">
                                        <option>Caucasian</option>
                                        <option>AfricanAmerican</option>
                                        <option>Hispanic</option>
                                        <option>Asian</option>
                                        <option>Other</option>
                                    </select>
                                </FormField>
                                <FormField label="Gender">
                                    <select value={formData.gender} onChange={e => setFormData({...formData, gender: e.target.value})} className="w-full p-2 border rounded">
                                        <option>Male</option>
                                        <option>Female</option>
                                    </select>
                                </FormField>
                            </div>

                            <FormField label="Age Group">
                                <select value={formData.age} onChange={e => setFormData({...formData, age: e.target.value})} className="w-full p-2 border rounded">
                                    <option>[0-10)</option>
                                    <option>[10-20)</option>
                                    <option>[20-30)</option>
                                    <option>[30-40)</option>
                                    <option>[40-50)</option>
                                    <option>[50-60)</option>
                                    <option>[60-70)</option>
                                    <option>[70-80)</option>
                                    <option>[80-90)</option>
                                    <option>[90-100)</option>
                                </select>
                            </FormField>

                            {/* Admission/Discharge Information */}
                            <div className="grid grid-cols-3 gap-4">
                                <FormField label="Admission Type ID">
                                    <input type="number" min="1" max="8" value={formData.admission_type_id} onChange={e => setFormData({...formData, admission_type_id: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                                </FormField>
                                <FormField label="Discharge Disposition ID">
                                    <input type="number" min="1" max="29" value={formData.discharge_disposition_id} onChange={e => setFormData({...formData, discharge_disposition_id: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                                </FormField>
                                <FormField label="Admission Source ID">
                                    <input type="number" min="1" max="25" value={formData.admission_source_id} onChange={e => setFormData({...formData, admission_source_id: parseInt(e.target.value) || 7})} className="w-full p-2 border rounded" />
                                </FormField>
                            </div>

                            {/* Clinical Metrics */}
                            <div className="grid grid-cols-2 gap-4">
                                <FormField label="Time in Hospital (days)">
                                    <input type="number" min="1" max="14" value={formData.time_in_hospital} onChange={e => setFormData({...formData, time_in_hospital: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                                </FormField>
                                <FormField label="Number of Lab Procedures">
                                    <input type="number" min="1" value={formData.num_lab_procedures} onChange={e => setFormData({...formData, num_lab_procedures: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                                </FormField>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <FormField label="Number of Procedures">
                                    <input type="number" min="0" value={formData.num_procedures} onChange={e => setFormData({...formData, num_procedures: parseInt(e.target.value) || 0})} className="w-full p-2 border rounded" />
                                </FormField>
                                <FormField label="Number of Medications">
                                    <input type="number" min="1" value={formData.num_medications} onChange={e => setFormData({...formData, num_medications: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                                </FormField>
                            </div>

                            <FormField label="Number of Diagnoses">
                                <input type="number" min="1" max="16" value={formData.number_diagnoses} onChange={e => setFormData({...formData, number_diagnoses: parseInt(e.target.value) || 1})} className="w-full p-2 border rounded" />
                            </FormField>

                            {/* Visit History */}
                            <div className="border-t pt-4 mt-4">
                                <h3 className="font-semibold text-gray-700 mb-3">Previous Visits (Past 12 months)</h3>
                                <div className="grid grid-cols-3 gap-4">
                                    <FormField label="Outpatient Visits">
                                        <input type="number" min="0" value={formData.number_outpatient} onChange={e => setFormData({...formData, number_outpatient: parseInt(e.target.value) || 0})} className="w-full p-2 border rounded" />
                                    </FormField>
                                    <FormField label="Emergency Visits">
                                        <input type="number" min="0" value={formData.number_emergency} onChange={e => setFormData({...formData, number_emergency: parseInt(e.target.value) || 0})} className="w-full p-2 border rounded" />
                                    </FormField>
                                    <FormField label="Inpatient Visits">
                                        <input type="number" min="0" value={formData.number_inpatient} onChange={e => setFormData({...formData, number_inpatient: parseInt(e.target.value) || 0})} className="w-full p-2 border rounded" />
                                    </FormField>
                                </div>
                            </div>

                            {/* Medical Tests */}
                            <div className="border-t pt-4 mt-4">
                                <h3 className="font-semibold text-gray-700 mb-3">Medical Tests & Medications</h3>
                                <FormField label="A1C Test Result">
                                    <select value={formData.A1Cresult} onChange={e => setFormData({...formData, A1Cresult: e.target.value})} className="w-full p-2 border rounded">
                                        <option>Not Available</option>
                                        <option>Normal</option>
                                        <option>&gt;7</option>
                                        <option>&gt;8</option>
                                    </select>
                                </FormField>

                                <div className="grid grid-cols-2 gap-4 mt-4">
                                    <FormField label="Insulin Dosage">
                                        <select value={formData.insulin} onChange={e => setFormData({...formData, insulin: e.target.value})} className="w-full p-2 border rounded">
                                            <option>No</option>
                                            <option>Steady</option>
                                            <option>Down</option>
                                            <option>Up</option>
                                        </select>
                                    </FormField>
                                    <FormField label="Medication Change">
                                        <select value={formData.change} onChange={e => setFormData({...formData, change: e.target.value})} className="w-full p-2 border rounded">
                                            <option value="No">No</option>
                                            <option value="Ch">Yes</option>
                                        </select>
                                    </FormField>
                                </div>

                                <FormField label="Diabetes Medication Prescribed">
                                    <select value={formData.diabetesMed} onChange={e => setFormData({...formData, diabetesMed: e.target.value})} className="w-full p-2 border rounded">
                                        <option>Yes</option>
                                        <option>No</option>
                                    </select>
                                </FormField>
                            </div>

                            {/* Model Selection */}
                            <FormField label="Model">
                                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)} className="w-full p-2 border rounded" disabled={models.length === 0}>
                                    {models.length === 0 ? (
                                        <option>Loading models...</option>
                                    ) : (
                                        models.map(model => <option key={model} value={model}>{model}</option>)
                                    )}
                                </select>
                            </FormField>

                            <button
                                type="submit"
                                disabled={isDisabled || loading}
                                className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed"
                            >
                                {loading ? 'Predicting...' : isDisabled ? 'API Not Connected' : 'Predict Readmission Risk'}
                            </button>
                        </form>
                    </div>

                    {/* Results */}
                    <div className="card-shadow bg-white rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800">Prediction Results</h2>
                        {prediction ? (
                            <div className="space-y-6">
                                {/* Risk Badge */}
                                <div className="text-center py-8">
                                    <div className={`inline-block px-8 py-4 rounded-lg text-3xl font-bold ${
                                        prediction.risk_level === 'High' ? 'bg-red-100 text-red-700' :
                                        prediction.risk_level === 'Medium' ? 'bg-yellow-100 text-yellow-700' :
                                        'bg-green-100 text-green-700'
                                    }`}>
                                        {prediction.risk_level} Risk
                                    </div>
                                    <div className="mt-4 text-2xl text-gray-700">
                                        {(prediction.probability * 100).toFixed(1)}% Probability
                                    </div>
                                </div>

                                {/* Details */}
                                <div className="space-y-3">
                                    <DetailRow label="Prediction" value={prediction.prediction === 1 ? 'Readmission Likely' : 'No Readmission Expected'} />
                                    <DetailRow label="Model Used" value={prediction.model_used} />
                                    <DetailRow label="Timestamp" value={new Date(prediction.timestamp).toLocaleString()} />
                                </div>

                                {/* Feature Importance */}
                                {prediction.feature_importance && Object.keys(prediction.feature_importance).length > 0 && (
                                    <div className="mt-6">
                                        <h3 className="font-bold mb-3">Top Contributing Factors</h3>
                                        <div className="space-y-2">
                                            {Object.entries(prediction.feature_importance).slice(0, 5).map(([feature, importance]) => (
                                                <div key={feature} className="flex items-center gap-2">
                                                    <div className="w-32 text-sm text-gray-600 truncate" title={feature}>{feature}</div>
                                                    <div className="flex-1 bg-gray-200 rounded-full h-4">
                                                        <div className="bg-purple-600 h-4 rounded-full" style={{width: `${Math.min((importance * 100), 100)}%`}}></div>
                                                    </div>
                                                    <div className="w-16 text-sm text-right">{(importance * 100).toFixed(1)}%</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="text-center text-gray-500 py-20">
                                <svg className="w-20 h-20 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                </svg>
                                <p>Enter patient information and click predict to see results</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // CSV Upload Component
        function CSVUpload({ models, apiStatus }) {
            const [selectedModel, setSelectedModel] = useState('real_to_real_random_forest');
            const [results, setResults] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                setError(null);
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch(`${API_BASE_URL}/predict/csv?model_key=${selectedModel}`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'Upload failed');
                    }
                    
                    const data = await response.json();
                    setResults(data);
                } catch (error) {
                    console.error('Upload error:', error);
                    setError(error.message);
                } finally {
                    setLoading(false);
                }
            };

            const isDisabled = !apiStatus || apiStatus.status !== 'healthy' || models.length === 0;

            return (
                <div className="max-w-4xl mx-auto">
                    <div className="card-shadow bg-white rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800">CSV Batch Prediction</h2>
                        
                        {error && (
                            <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
                                <strong>Error:</strong> {error}
                            </div>
                        )}

                        <div className="space-y-4 mb-6">
                            <FormField label="Select Model">
                                <select value={selectedModel} onChange={e => setSelectedModel(e.target.value)} className="w-full p-2 border rounded" disabled={models.length === 0}>
                                    {models.length === 0 ? (
                                        <option>Loading models...</option>
                                    ) : (
                                        models.map(model => <option key={model} value={model}>{model}</option>)
                                    )}
                                </select>
                            </FormField>

                            <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
                                <input
                                    type="file"
                                    accept=".csv"
                                    onChange={handleFileUpload}
                                    disabled={loading || isDisabled}
                                    className="hidden"
                                    id="csv-upload"
                                />
                                <label htmlFor="csv-upload" className={`cursor-pointer ${(loading || isDisabled) ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                    <svg className="w-16 h-16 mx-auto mb-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                    <p className="text-lg font-medium">
                                        {loading ? 'Processing...' : isDisabled ? 'API Not Connected' : 'Click to upload CSV file'}
                                    </p>
                                    <p className="text-sm text-gray-500 mt-2">CSV must contain all 18 required features</p>
                                </label>
                            </div>
                        </div>

                        {results && (
                            <div className="space-y-6">
                                {/* Summary */}
                                <div className="grid grid-cols-4 gap-4">
                                    <StatCard label="Total Patients" value={results.summary.total_patients} color="blue" />
                                    <StatCard label="High Risk" value={results.summary.high_risk_count} color="red" />
                                    <StatCard label="Medium Risk" value={results.summary.medium_risk_count} color="yellow" />
                                    <StatCard label="Low Risk" value={results.summary.low_risk_count} color="green" />
                                </div>

                                {/* Results Table */}
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="px-4 py-2 text-left">#</th>
                                                <th className="px-4 py-2 text-left">Risk Level</th>
                                                <th className="px-4 py-2 text-left">Probability</th>
                                                <th className="px-4 py-2 text-left">Prediction</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {results.predictions.slice(0, 10).map((pred, idx) => (
                                                <tr key={idx} className="border-b hover:bg-gray-50">
                                                    <td className="px-4 py-2">{idx + 1}</td>
                                                    <td className="px-4 py-2">
                                                        <span className={`px-2 py-1 rounded text-xs font-semibold ${
                                                            pred.risk_level === 'High' ? 'bg-red-100 text-red-700' :
                                                            pred.risk_level === 'Medium' ? 'bg-yellow-100 text-yellow-700' :
                                                            'bg-green-100 text-green-700'
                                                        }`}>
                                                            {pred.risk_level}
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-2">{(pred.probability * 100).toFixed(1)}%</td>
                                                    <td className="px-4 py-2">{pred.prediction === 1 ? 'Yes' : 'No'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {results.predictions.length > 10 && (
                                        <p className="text-center text-gray-500 py-4">Showing 10 of {results.predictions.length} results</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Models Info Component
        function ModelsInfo({ models, apiStatus, features }) {
            return (
                <div className="max-w-4xl mx-auto space-y-6">
                    <div className="card-shadow bg-white rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800">System Information</h2>
                        <div className="space-y-2">
                            <DetailRow label="API Status" value={apiStatus?.status || 'Unknown'} />
                            <DetailRow label="Models Loaded" value={apiStatus?.models_loaded ? 'Yes' : 'No'} />
                            <DetailRow label="Total Models" value={models.length} />
                            <DetailRow label="Expected Features" value={apiStatus?.n_features_expected || features.length} />
                            <DetailRow label="Last Updated" value={apiStatus?.timestamp ? new Date(apiStatus.timestamp).toLocaleString() : 'N/A'} />
                        </div>
                    </div>

                    <div className="card-shadow bg-white rounded-lg p-6">
                        <h2 className="text-2xl font-bold mb-6 text-gray-800">Available Models</h2>
                        <div className="space-y-3">
                            {models.length === 0 ? (
                                <p className="text-gray-500">No models loaded. Check API connection.</p>
                            ) : (
                                models.map(model => (
                                    <div key={model} className="p-4 border rounded-lg hover:bg-gray-50">
                                        <div className="font-medium text-gray-800">{model}</div>
                                        <div className="text-sm text-gray-600 mt-1">Ready for predictions</div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {features.length > 0 && (
                        <div className="card-shadow bg-white rounded-lg p-6">
                            <h2 className="text-2xl font-bold mb-6 text-gray-800">Required Features ({features.length})</h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                {features.map(feature => (
                                    <div key={feature} className="text-sm p-2 bg-gray-50 rounded border">
                                        {feature}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Helper Components
        function FormField({ label, children }) {
            return (
                <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
                    {children}
                </div>
            );
        }

        function DetailRow({ label, value }) {
            return (
                <div className="flex justify-between py-2 border-b">
                    <span className="font-medium text-gray-600">{label}</span>
                    <span className="text-gray-800">{value}</span>
                </div>
            );
        }

        function StatCard({ label, value, color }) {
            const colorClasses = {
                blue: 'bg-blue-100 text-blue-700',
                red: 'bg-red-100 text-red-700',
                yellow: 'bg-yellow-100 text-yellow-700',
                green: 'bg-green-100 text-green-700'
            };
            
            return (
                <div className={`rounded-lg p-4 ${colorClasses[color]}`}>
                    <div className="text-2xl font-bold">{value}</div>
                    <div className="text-sm font-medium mt-1">{label}</div>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
